# Reading Files
include:
- _pages
exclude:
- citation
- _pages/includes
- _pages/includes_zh
- "*.sublime-project"
- "*.sublime-workspace"
- .github
- Gemfile
- Gemfile.lock
- LICENSE
- README.md
- node_modules
- vendor
keep_files:
- .git
- .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Defaults
defaults:
# _pages
- scope:
    path: ""
    type: pages
  values:
    layout: default
    author_profile: true
- scope:
    path: "_pages/includes"
    type: pages
  values:
    published: false
    sitemap: false
    robots: "noindex, nofollow"
- scope:
    path: "_pages/includes_zh"
    type: pages
  values:
    published: false
    sitemap: false
    robots: "noindex, nofollow"

# Sass/SCSS
sass:
  sass_dir: _sass
  load_paths:
  - _sass
  style: compressed # http://sass-lang.com/documentation/file.SASS_REFERENCE.html#output_style
  # The minimal-mistakes theme still uses @import (Dart Sass keeps it through a
  # long transition). Silence only that deprecation; all other warnings stay on.
  silence_deprecations:
  - import

# Outputting
permalink: /:categories/:title/
timezone: Asia/Shanghai # http://en.wikipedia.org/wiki/List_of_tz_database_time_zones

# Plugins
plugins:
- jekyll-sitemap
- jekyll-feed
- jekyll-redirect-from

# HTML Compression
# - http://jch.penibelst.de/
compress_html:
  clippings: all
  ignore:
    envs: development

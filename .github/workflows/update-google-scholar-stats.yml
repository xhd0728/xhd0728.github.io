name: Update Google Scholar stats

on:
  schedule:
    - cron: "17 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: google-scholar-stats
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: citation/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r citation/requirements.txt

      - name: Generate Google Scholar stats
        env:
          SCHOLAR_USER_ID: 8VCnj3sAAAAJ
          SCHOLAR_LANGUAGE: en
          SCHOLAR_TIMEOUT: 30
          SCHOLAR_RETRIES: 5
        run: |
          python citation/get_citation.py \
            --user-id "${SCHOLAR_USER_ID}" \
            --output gs_data.json

      - name: Publish stats branch
        env:
          DEPLOY_BRANCH: google-scholar-stats
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REMOTE_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          STATS_DIR="/tmp/google-scholar-stats"

          rm -rf "${STATS_DIR}"

          if git ls-remote --exit-code --heads "${REMOTE_URL}" "${DEPLOY_BRANCH}" >/dev/null 2>&1; then
            git clone --depth 1 --branch "${DEPLOY_BRANCH}" "${REMOTE_URL}" "${STATS_DIR}"
            find "${STATS_DIR}" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          else
            git init -b "${DEPLOY_BRANCH}" "${STATS_DIR}"
            git -C "${STATS_DIR}" remote add origin "${REMOTE_URL}"
          fi

          cp gs_data.json "${STATS_DIR}/gs_data.json"

          git -C "${STATS_DIR}" config user.name "github-actions[bot]"
          git -C "${STATS_DIR}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "${STATS_DIR}" add --all

          if git -C "${STATS_DIR}" diff --cached --quiet; then
            echo "Google Scholar stats are already up to date."
            exit 0
          fi

          git -C "${STATS_DIR}" commit -m "Update Google Scholar stats"
          git -C "${STATS_DIR}" push origin "${DEPLOY_BRANCH}"

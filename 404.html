<script>
(function() {
  var btn = document.getElementById('back-to-top');
  if (btn) {
    var ticking = false;
    window.addEventListener('scroll', function() {
      if (ticking) return;
      ticking = true;
      window.requestAnimationFrame(function() {
        btn.classList.toggle('visible', window.scrollY > 300);
        ticking = false;
      });
    }, { passive: true });
    btn.addEventListener('click', function() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }

  var fadeTargets = document.querySelectorAll(
    '.page__content > h1, .page__content > ul, .page__content > .paper-box, .page__content > blockquote, .page__content > hr'
  );
  if (fadeTargets.length && 'IntersectionObserver' in window) {
    var observer = new IntersectionObserver(function(entries, obs) {
      entries.forEach(function(entry) {
        if (!entry.isIntersecting) return;
        entry.target.classList.add('is-visible');
        entry.target.style.willChange = 'auto';
        obs.unobserve(entry.target);
      });
    }, {
      threshold: 0.01,
      rootMargin: '0px 0px -8% 0px'
    });

    fadeTargets.forEach(function(el) {
      el.classList.add('fade-in-section');
      el.style.willChange = 'opacity, transform';
      observer.observe(el);
    });
  }

  // Open external links in a new tab. The global base-tag blank target was
  // removed so in-site links stay in the same tab; restore it for outbound.
  var links = document.querySelectorAll('.page__content a[href], .sidebar a[href]');
  links.forEach(function(a) {
    var href = a.getAttribute('href') || '';
    if (a.hostname && a.hostname !== window.location.hostname && /^https?:/i.test(a.protocol)) {
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
    }
  });

  // Defer decoding of shields.io badges so they don't block the main thread.
  document.querySelectorAll('img[src*="shields.io"]').forEach(function(img) {
    if (!img.hasAttribute('decoding')) img.setAttribute('decoding', 'async');
  });
})();
</script>

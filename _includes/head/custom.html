<script>
  (function () {
    function containsMathSyntax(text) {
      if (!text) return false;
      return /\\\(|\\\[|\\begin\{|\\frac|\\sum|\\int|\$\$[^$]+\$\$|\$[^$\n]+\$/.test(text);
    }

    function loadMathJax() {
      if (document.getElementById('MathJax-script')) return;
      window.MathJax = {
        tex: {
          inlineMath: [['$','$'], ['\\(','\\)']],
          processEscapes: true,
          tags: 'all'
        },
        options: {
          skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
        }
      };

      var script = document.createElement('script');
      script.id = 'MathJax-script';
      script.async = true;
      script.src = 'https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js';
      document.head.appendChild(script);
    }

    document.addEventListener('DOMContentLoaded', function () {
      var content = document.querySelector('.page__content');
      if (!content || !containsMathSyntax(content.textContent || '')) return;

      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadMathJax, { timeout: 2000 });
      } else {
        window.setTimeout(loadMathJax, 400);
      }
    });
  })();
</script>

<style>
  /* ===== Design System Variables ===== */
  :root {
    --c-primary: #2b5797;
    --c-primary-light: #4a8fd9;
    --c-primary-dark: #1e3f6f;
    --c-accent: #3d8eb9;
    --c-accent-warm: #e8713a;
    --c-text: #1a1a2e;
    --c-text-muted: #6b7280;
    --c-border: #e8ecf4;
    --ease: cubic-bezier(0.25, 0.8, 0.25, 1);
    --page-gutter: clamp(0.75rem, 2.8vw, 1rem);
    --nav-toggle-width: clamp(2.7rem, 10vw, 2.9rem);
    --nav-side-reserve: calc(var(--nav-toggle-width) + 0.45rem);
    --lang-toggle-offset: calc(var(--nav-toggle-width) + 0.55rem);
    --lang-trigger-width: clamp(6.8rem, 20vw, 8.1rem);
  }

  /* ===== Back-to-top button ===== */
  #back-to-top {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 38px;
    height: 38px;
    background: var(--c-primary);
    color: #fff;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: none;
    z-index: 999;
    box-shadow: 0 2px 10px rgba(43, 87, 151, 0.3);
    transition: opacity 0.3s ease, transform 0.3s ease;
    opacity: 0;
    transform: translateY(10px);
    align-items: center;
    justify-content: center;
  }
  #back-to-top.visible {
    display: flex;
    opacity: 0.85;
    transform: translateY(0);
  }
  #back-to-top:hover {
    opacity: 1;
    transform: translateY(-2px);
  }

  /* =========================================================
     SECTION HEADINGS — academic style
     ========================================================= */
  .page__content > h1 {
    font-size: 1.28em;
    font-weight: 700;
    color: var(--c-text);
    padding-bottom: 0.45em;
    margin-top: 1.8em;
    margin-bottom: 0.8em;
    border-bottom: none;
    position: relative;
    letter-spacing: 0.01em;
  }
  .page__content > h1::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 40px;
    height: 2.5px;
    background: linear-gradient(90deg, var(--c-primary), var(--c-accent));
    border-radius: 2px;
    transition: width 0.35s var(--ease);
  }
  .page__content > h1:hover::after {
    width: 64px;
  }

  /* =========================================================
     BLOCKQUOTE — announcement
     ========================================================= */
  .page__content blockquote + .paper-box {
    padding-top: 0.5em;
  }
  .page__content blockquote {
    background: linear-gradient(135deg, #fffaf6 0%, #fff5ee 100%);
    border-left: 3px solid var(--c-accent-warm);
    border-radius: 0 8px 8px 0;
    padding: 0.9em 1.2em;
    margin: 1em 0;
    box-shadow: 0 1px 6px rgba(232, 113, 58, 0.06);
  }

  /* =========================================================
     TIMELINE LIST — News / Awards / Educations / etc.
     ========================================================= */
  .page__content > ul {
    list-style: none;
    padding-left: 22px;
    position: relative;
    margin-top: 0.4em;
  }
  /* Vertical timeline line */
  .page__content > ul::before {
    content: '';
    position: absolute;
    left: 5px;
    top: 6px;
    bottom: 6px;
    width: 1.5px;
    background: linear-gradient(180deg, var(--c-primary) 0%, #c0d0e8 50%, transparent 100%);
    border-radius: 1px;
  }

  /* List items — lightweight */
  .page__content > ul > li {
    position: relative;
    padding: 0.4em 0.7em;
    margin-bottom: 3px;
    background: transparent;
    border: none;
    border-radius: 5px;
    transition: background 0.25s ease, transform 0.25s ease;
    line-height: 1.6;
    font-size: 0.95em;
  }

  /* Timeline dot — small & refined */
  .page__content > ul > li::before {
    content: '';
    position: absolute;
    left: -20px;
    top: 50%;
    transform: translateY(-50%);
    width: 7px;
    height: 7px;
    background: #fff;
    border: 2px solid var(--c-primary);
    border-radius: 50%;
    z-index: 1;
    transition: background 0.2s ease, box-shadow 0.2s ease;
  }

  /* Hover — gentle highlight */
  .page__content > ul > li:hover {
    background: rgba(43, 87, 151, 0.04);
    transform: translateX(3px);
  }
  .page__content > ul > li:hover::before {
    background: var(--c-primary);
    box-shadow: 0 0 0 3px rgba(43, 87, 151, 0.10);
  }

  /* Date badge */
  .page__content > ul > li > em:first-child {
    display: inline-block;
    background: var(--c-primary);
    color: #fff;
    padding: 0.08em 0.5em;
    border-radius: 3px;
    font-size: 0.78em;
    font-style: normal;
    font-weight: 600;
    letter-spacing: 0.03em;
    margin-right: 0.25em;
    vertical-align: middle;
  }

  /* =========================================================
     SIDEBAR PROFILE
     ========================================================= */
  .author__avatar img {
    transition: box-shadow 0.3s ease;
    border: 2px solid #dce4f2 !important;
  }
  .author__avatar img:hover {
    box-shadow: 0 4px 16px rgba(43, 87, 151, 0.14) !important;
  }
  .author__name {
    letter-spacing: 0.02em;
    font-weight: 700;
    color: var(--c-text);
  }
  .author__bio {
    color: var(--c-primary);
    font-weight: 500;
    font-size: 0.9em;
  }
  .sidebar .author__urls .social-icons li {
    transition: background 0.2s ease;
    border-radius: 4px;
    padding: 1px 2px;
  }
  .sidebar .author__urls .social-icons li:hover {
    background: rgba(43, 87, 151, 0.05);
  }
  .author__urls-wrapper .social-icons a {
    transition: color 0.2s ease;
  }
  .author__urls-wrapper .social-icons a:hover {
    color: var(--c-primary) !important;
  }
  .author__urls_sm {
    text-align: center;
  }
  .author__urls_sm a {
    transition: color 0.2s ease, transform 0.2s ease;
    display: inline-block;
    margin: 0 2px;
  }
  .author__urls_sm a:hover {
    color: var(--c-primary) !important;
    transform: translateY(-1px);
  }

  /* =========================================================
     INTRO SECTION — academic typography
     ========================================================= */
  .page__content > p:first-of-type {
    line-height: 1.85;
  }
  .page__content > p {
    line-height: 1.75;
    color: #374151;
  }

  /* =========================================================
     PAGE INFO BAR — compact footer
     ========================================================= */
  .page-info-bar {
    text-align: center;
    font-size: 0.92em;
    color: var(--c-text-muted);
    padding: 0.5em 0;
    margin: 0.6em 0 0.2em;
    border-top: 1px solid #eef1f6;
    border-bottom: 1px solid #eef1f6;
    letter-spacing: 0.01em;
    line-height: 1.8;
  }
  .page-info-bar i {
    margin-right: 0.15em;
    opacity: 0.65;
  }
  .page-info-bar a {
    color: var(--c-primary) !important;
    text-decoration: none !important;
    border-bottom: none !important;
  }
  .page-info-bar a:hover {
    color: var(--c-primary-dark) !important;
  }
  .page-info-bar .info-sep {
    margin: 0 0.5em;
    color: #ccc;
  }

  /* =========================================================
     RTL CONTENT — Arabic page support
     ========================================================= */
  .page__content[dir="rtl"] {
    text-align: right;
  }
  .page__content[dir="rtl"] > h1::after {
    left: auto;
    right: 0;
  }
  .page__content[dir="rtl"] blockquote {
    border-left: none;
    border-right: 3px solid var(--c-accent-warm);
    border-radius: 8px 0 0 8px;
  }
  .page__content[dir="rtl"] > ul {
    padding-left: 0;
    padding-right: 22px;
  }
  .page__content[dir="rtl"] > ul::before {
    left: auto;
    right: 5px;
  }
  .page__content[dir="rtl"] > ul > li::before {
    left: auto;
    right: -20px;
  }
  .page__content[dir="rtl"] > ul > li:hover {
    transform: translateX(-3px);
  }
  .page__content[dir="rtl"] > ul > li > em:first-child {
    margin-right: 0;
    margin-left: 0.25em;
  }
  .page__content[dir="rtl"] .page-info-bar i {
    margin-right: 0;
    margin-left: 0.15em;
  }
  .sidebar[dir="rtl"],
  .sidebar[dir="rtl"] .author__content,
  .sidebar[dir="rtl"] .author__urls,
  .sidebar[dir="rtl"] .author__urls li,
  .sidebar[dir="rtl"] .author__urls_sm {
    text-align: right;
  }
  .sidebar[dir="rtl"] .profile_box {
    direction: rtl;
  }
  .sidebar[dir="rtl"] .author__content {
    padding-left: 0;
    padding-right: 10px;
  }

  /* =========================================================
     LANGUAGE SWITCHER
     ========================================================= */
  .masthead__menu {
    position: relative;
  }
  .greedy-nav {
    min-height: 2.8rem;
    padding-right: var(--nav-side-reserve);
  }
  .greedy-nav > .greedy-nav__toggle {
    position: absolute;
    right: 0;
    width: var(--nav-toggle-width);
    height: 100%;
  }
  .greedy-nav .visible-links {
    display: inline-flex;
    align-items: center;
    flex-wrap: nowrap;
    width: auto;
    max-width: 100%;
  }
  .greedy-nav .visible-links li {
    display: block;
    flex: 0 0 auto;
  }
  .masthead__lang-menu {
    position: absolute;
    top: 0;
    bottom: 0;
    right: var(--lang-toggle-offset);
    display: flex;
    align-items: center;
    z-index: 12;
  }
  .masthead__lang-menu .lang-menu__trigger {
    display: inline-flex;
    align-items: center;
    gap: clamp(0.32rem, 0.9vw, 0.5rem);
    width: var(--lang-trigger-width);
    min-height: 1.96rem;
    padding: clamp(0.26rem, 0.9vw, 0.36rem) clamp(0.5rem, 1.5vw, 0.66rem);
    border: 1px solid rgba(43, 87, 151, 0.16);
    border-radius: 1rem;
    background:
      radial-gradient(circle at top left, rgba(74, 143, 217, 0.16), transparent 48%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(243, 247, 252, 0.98));
    color: var(--c-primary-dark);
    box-shadow:
      0 10px 28px rgba(43, 87, 151, 0.11),
      inset 0 1px 0 rgba(255, 255, 255, 0.72);
    cursor: pointer;
    font: inherit;
    line-height: 1;
    text-align: left;
    transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease, background 0.2s ease;
  }
  .masthead__lang-menu .lang-menu__trigger:hover,
  .masthead__lang-menu .lang-menu__trigger:focus-visible,
  .masthead__lang-menu.is-open .lang-menu__trigger {
    border-color: rgba(43, 87, 151, 0.32);
    box-shadow:
      0 14px 30px rgba(43, 87, 151, 0.16),
      inset 0 1px 0 rgba(255, 255, 255, 0.82);
    transform: translateY(-1px);
  }
  .masthead__lang-menu.is-open .lang-menu__trigger {
    background:
      radial-gradient(circle at top left, rgba(74, 143, 217, 0.22), transparent 48%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.99), rgba(239, 245, 251, 0.99));
  }
  .masthead__lang-menu .lang-menu__icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 1.62rem;
    height: clamp(1.06rem, 3vw, 1.24rem);
    padding: 0 0.34rem;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--c-primary), var(--c-accent));
    color: #fff;
    box-shadow: 0 6px 14px rgba(43, 87, 151, 0.18);
    font-size: clamp(0.54rem, 1.35vw, 0.62rem);
    font-weight: 700;
    letter-spacing: 0.08em;
    flex-shrink: 0;
  }
  .masthead__lang-menu .lang-menu__current {
    flex: 0 1 auto;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--c-primary-dark);
    font-size: clamp(0.67rem, 1.9vw, 0.77rem);
    font-weight: 700;
    letter-spacing: 0.01em;
  }
  .masthead__lang-menu .lang-menu__caret {
    width: 0.42rem;
    height: 0.42rem;
    border-right: 2px solid currentColor;
    border-bottom: 2px solid currentColor;
    transform: rotate(45deg) translateY(-1px);
    transition: transform 0.2s ease;
    flex-shrink: 0;
    pointer-events: none;
  }
  .masthead__lang-menu.is-open .lang-menu__caret {
    transform: rotate(-135deg) translateY(-1px);
  }
  .masthead__lang-menu .lang-menu__panel {
    position: absolute;
    top: calc(100% + 0.55rem);
    right: 0;
    width: max-content;
    min-width: max(100%, 12rem);
    max-width: calc(100vw - (var(--page-gutter) * 2));
    padding: 0.32rem;
    border: 1px solid rgba(43, 87, 151, 0.14);
    border-radius: 1.05rem;
    background: rgba(255, 255, 255, 0.92);
    box-shadow:
      0 20px 44px rgba(20, 40, 80, 0.18),
      0 6px 18px rgba(43, 87, 151, 0.08);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    opacity: 0;
    transform: translateY(-8px) scale(0.97);
    transform-origin: top right;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  .masthead__lang-menu.is-open .lang-menu__panel {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }
  .masthead__lang-menu .lang-menu__option {
    display: grid;
    grid-template-columns: auto minmax(0, 1fr);
    align-items: center;
    gap: 0.56rem;
    width: 100%;
    margin: 0;
    padding: 0.44rem 0.56rem;
    border: 1px solid transparent;
    border-radius: 0.72rem;
    box-sizing: border-box;
    background: transparent;
    color: var(--c-text);
    text-decoration: none;
    transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease, transform 0.18s ease;
  }
  .masthead__lang-menu .lang-menu__option:hover,
  .masthead__lang-menu .lang-menu__option:focus-visible {
    background: linear-gradient(135deg, rgba(43, 87, 151, 0.08), rgba(61, 142, 185, 0.12));
    border-color: rgba(43, 87, 151, 0.16);
    color: var(--c-primary-dark);
    transform: translateX(2px);
  }
  .masthead__lang-menu .lang-menu__option.is-current {
    grid-template-columns: auto minmax(0, 1fr) auto;
    background: rgba(43, 87, 151, 0.07);
    border-color: transparent;
    color: var(--c-primary-dark);
    cursor: default;
  }
  .masthead__lang-menu .lang-menu__option-chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 1.95rem;
    height: 1.34rem;
    padding: 0 0.34rem;
    border-radius: 999px;
    background: linear-gradient(135deg, rgba(43, 87, 151, 0.13), rgba(61, 142, 185, 0.2));
    color: var(--c-primary-dark);
    font-size: 0.58rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .masthead__lang-menu .lang-menu__option-label {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 0.78rem;
    font-weight: 600;
  }
  .masthead__lang-menu .lang-menu__option.is-current .lang-menu__option-chip {
    background: rgba(43, 87, 151, 0.12);
  }
  .masthead__lang-menu .lang-menu__option-check {
    width: 0.33rem;
    height: 0.62rem;
    border-right: 2px solid var(--c-accent);
    border-bottom: 2px solid var(--c-accent);
    transform: rotate(40deg);
    margin-right: 0.12rem;
  }

  /* Remove extra hr spacing before/after the info bar */
  .page__content > hr + .page-info-bar,
  .page-info-bar + hr {
    margin-top: 0;
  }

  /* ===== Footer / page-view bar (legacy fallback) ===== */
  .page__content > p > span#busuanzi_container_site_pv,
  .page__content > p:has(#busuanzi_container_site_pv) {
    display: block;
    text-align: center;
    font-size: 0.82em;
    color: var(--c-text-muted);
  }

  /* ===== Links ===== */
  .page__content a:not(.btn):hover {
    text-decoration: none;
    color: var(--c-primary-dark);
  }

  /* ===== Text selection ===== */
  ::selection {
    background: var(--c-accent);
    color: #fff;
  }

  /* =========================================================
     ANIMATIONS (JS fallback for browsers without scroll-driven)
     ========================================================= */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-in-section {
    opacity: 0;
    transform: translate3d(0, 14px, 0);
    transition: opacity 0.38s ease-out, transform 0.38s ease-out;
  }
  .fade-in-section.is-visible {
    opacity: 1;
    transform: translate3d(0, 0, 0);
  }

  /* =========================================================
     HORIZONTAL RULES
     ========================================================= */
  .page__content hr {
    border: none;
    height: 1px;
    background: linear-gradient(90deg, transparent, #dde4ea 20%, #dde4ea 80%, transparent);
    margin: 1.2em 0;
  }

  /* =========================================================
     PAPER-BOX — publications
     ========================================================= */
  .paper-box {
    border: 1px solid #edf0f7;
    padding: 1.4em 1em !important;
    border-radius: 10px !important;
    background: #fff;
    content-visibility: auto;
    contain-intrinsic-size: 320px;
  }
  .paper-box:not(:last-child) {
    border-bottom: 1px solid #edf0f7 !important;
    margin-bottom: 0.6em;
  }
  .paper-box:hover {
    background-color: #fafcff !important;
    box-shadow: 0 3px 14px rgba(43, 87, 151, 0.07) !important;
    border-color: #dce4f2 !important;
  }
  .paper-box .paper-box-image > div {
    position: relative;
  }
  .paper-box .badge {
    background: linear-gradient(135deg, #1a3a8a, #2b5797) !important;
    box-shadow: 0 1px 6px rgba(0, 54, 159, 0.25);
    font-size: 0.72em;
    padding: 0.25em 0.75em;
    border-radius: 0 4px 4px 0;
    letter-spacing: 0.04em;
    z-index: 2;
  }
  .paper-box-image img {
    position: relative;
    z-index: 1;
    border-radius: 6px !important;
    transition: transform 0.35s var(--ease), box-shadow 0.35s var(--ease) !important;
  }
  .paper-box:hover .paper-box-image img {
    transform: scale(1.015);
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.10) !important;
  }

  /* =========================================================
     RESPONSIVE
     ========================================================= */
  @media (max-width: 768px) {
    .greedy-nav .visible-links {
      max-width: none;
    }
    .greedy-nav a {
      margin-inline: clamp(0.4rem, 1.6vw, 0.75rem);
    }
    .masthead__lang-menu .lang-menu__trigger {
      width: clamp(6.2rem, 21vw, 7.3rem);
      padding-inline: clamp(0.42rem, 1.5vw, 0.56rem);
    }
    .masthead__lang-menu .lang-menu__panel {
      min-width: max(100%, 10.2rem);
    }
    .page__content > ul {
      padding-left: 18px;
    }
    .page__content > ul > li {
      padding: 0.35em 0.6em;
      font-size: 0.92em;
    }
    .page__content > ul > li::before {
      left: -16px;
      width: 6px;
      height: 6px;
    }
    .page__content > ul > li:hover {
      transform: translateX(2px);
    }
    .paper-box {
      padding: 0.8em 0.6em !important;
    }
    .page-info-bar {
      font-size: 0.85em;
    }
    .page-info-bar .info-sep {
      display: none;
    }
    .page-info-bar span {
      display: block;
    }
  }

  @media (max-width: 430px) {
    .greedy-nav {
      min-width: 0;
    }
    .greedy-nav a {
      margin-inline: clamp(0.38rem, 1.4vw, 0.62rem);
      font-size: 0.95rem;
    }
    .masthead__lang-menu .lang-menu__trigger {
      width: auto;
      max-width: 6.7rem;
      padding-inline: clamp(0.38rem, 1.4vw, 0.5rem);

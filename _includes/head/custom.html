<script>
  (function () {
    function containsMathSyntax(text) {
      if (!text) return false;
      return /\\\(|\\\[|\\begin\{|\\frac|\\sum|\\int|\$\$[^$]+\$\$|\$[^$\n]+\$/.test(text);
    }

    function loadMathJax() {
      if (document.getElementById('MathJax-script')) return;
      window.MathJax = {
        tex: {
          inlineMath: [['$','$'], ['\\(','\\)']],
          processEscapes: true,
          tags: 'all'
        },
        options: {
          skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
        }
      };

      var script = document.createElement('script');
      script.id = 'MathJax-script';
      script.async = true;
      script.src = 'https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js';
      document.head.appendChild(script);
    }

    document.addEventListener('DOMContentLoaded', function () {
      var content = document.querySelector('.page__content');
      if (!content || !containsMathSyntax(content.textContent || '')) return;

      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadMathJax, { timeout: 2000 });
      } else {
        window.setTimeout(loadMathJax, 400);
      }
    });
  })();
</script>

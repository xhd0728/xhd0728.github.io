<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button>
          <div class="navicon"></div>
        </button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item"><a
              href="#about-me" target="_self">Homepage</a></li>
          {% for link in site.data.navigation.main %}
          {% assign is_external = link.url contains '://' %}
          <li class="masthead__menu-item">
            <a
              href="{% if is_external %}{{ link.url }}{% else %}{{ domain }}{{ link.url }}{% endif %}"
              {% if is_external %}target="_blank" rel="noopener noreferrer"{% else %}target="_self"{% endif %}
            >{{ link.title }}</a>
          </li>
          {% endfor %}
          <!-- <li class="masthead__menu-item">
            <a href="{% if page.url contains 'zh_cn' %}{{ domain }}/{% else %}{{ domain }}/zh_cn{% endif %}"
              target="_self">
              {% if page.url contains 'zh_cn' %}English{% else %}简体中文{% endif %}
            </a>
          </li> -->
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
